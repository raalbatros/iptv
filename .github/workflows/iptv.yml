name: IPTV Birleştirici

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  birlesik-iptv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Bağımlılıkları yükle
        run: npm install axios
      
      - name: Birleşik M3U oluştur
        run: node scripts/iptv.js
      
      - name: GitHub'a gönder
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add iptv.m3u
          git commit -m "📺 IPTV güncellendi $(date +'%Y-%m-%d %H:%M')" || echo "Değişiklik yok"
          git push
