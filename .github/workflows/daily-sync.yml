name: Film Arşivi Güncellemesi

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-films:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Bağımlılıkları yükle
        run: npm install axios
      
      - name: Filmleri tara ve M3U oluştur
        run: node scripts/film-scraper.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      
      - name: GitHub'a gönder
        run: |
          git config user.name "GitHub Actions Bot"
          git config.user.email "actions@github.com"
          git add filmler/films.m3u
          git commit -m "🎬 Film arşivi güncellendi $(date +'%Y-%m-%d')" || echo "Değişiklik yok"
          git pull origin main --no-rebase
          git push
