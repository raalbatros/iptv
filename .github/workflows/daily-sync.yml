name: Film Arşivi Güncellemesi

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-films:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Bağımlılıkları yükle
        run: npm install axios
      
      - name: Filmleri tara ve M3U oluştur
        run: node scripts/film-scraper.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      
      - name: GitHub'a zorla gönder
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add filmler/films.m3u
          git commit -m "🎬 Film güncellemesi $(date +'%Y-%m-%d')" || true
          git push --force origin main
