name: Film Arşivi Güncellemesi

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scrape-films:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Bağımlılıkları yükle
        run: npm install axios
      
      - name: Filmleri tara
        run: node scripts/film-scraper.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      
      - name: Değişiklikleri kaydet
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add filmler/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "🎬 Film güncellemesi $(date +'%Y-%m-%d')"
          git push
