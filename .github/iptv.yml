name: Birleşik IPTV Oluşturucu

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  birlesik-iptv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Film arşivini güncelle
        run: |
          npm install axios
          node scripts/film-scraper.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      
      - name: Birleşik M3U oluştur (4 kategori)
        run: node scripts/birlesik-iptv.js
      
      - name: GitHub'a gönder
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add iptv.m3u filmler/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "📺 IPTV listesi güncellendi $(date +'%Y-%m-%d')"
          git push
